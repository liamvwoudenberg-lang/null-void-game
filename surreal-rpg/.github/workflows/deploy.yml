name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # This script runs every time you push to the 'main' branch

# Sets permissions for the automated script
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Build the Game
        run: npm run build
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4
      - name: Upload Build Folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
